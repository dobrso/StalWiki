{% extends 'base.html' %}

{% block title %}
    Регистрация
{% endblock %}

{% block content %}
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus auth-icon"></i>
                <h1 class="auth-title">Регистрация</h1>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}

                {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}" class="form-label">
                            <i class="{% if field.name == 'username' %}fas fa-user{% elif field.name == 'email' %}fas fa-envelope{% elif field.name == 'password1' %}fas fa-lock{% elif field.name == 'password2' %}fas fa-check-circle{% else %}fas fa-edit{% endif %}"></i>
                            {{ field.label }}
                        </label>
                        {{ field }}
                    </div>
                {% endfor %}

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-circle"></i>
                    Зарегистрироваться
                </button>
            </form>

            <div class="auth-footer">
                <p>Уже есть аккаунт? <a href="{% url 'users:login' %}" class="auth-link">Войти</a></p>
            </div>
        </div>
    </div>
{% endblock %}
