{% extends 'base.html' %}

{% block title %}
    Вход
{% endblock %}

{% block content %}
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-sign-in-alt auth-icon"></i>
                <h1 class="auth-title">Вход</h1>
            </div>

            <form method="post" class="auth-form">
                {% csrf_token %}

                {% for field in form %}
                    <div class="form-group">
                        <label for="{{ field.id_for_label }}" class="form-label">
                            <i class="{% if field.name == 'username' %}fas fa-user{% elif field.name == 'password' %}fas fa-lock{% else %}fas fa-edit{% endif %}"></i>
                            {{ field.label }}
                        </label>
                        {{ field }}
                    </div>
                {% endfor %}

                <button type="submit" class="btn-submit">
                    <i class="fas fa-arrow-right"></i>
                    Войти
                </button>
            </form>

            <div class="auth-footer">
                <p>Нет аккаунта? <a href="{% url 'users:register' %}" class="auth-link">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
{% endblock %}
