{% extends 'base.html' %}

{% block title %}
    Создание руководства
{% endblock %}

{% block content %}
<div class="guides-page">
    <div class="page-header">
        <h1 class="page-title">
            <i class="fas fa-pen-fancy"></i>
            Создать руководство
        </h1>
        <div class="button-container">
            <a href="{% url 'guides:guide_list' %}" class="btn-back">
                <i class="fas fa-arrow-left"></i>
                Назад к списку
            </a>
        </div>
    </div>

    <div class="form-container">
        <form method="post" class="guide-form">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-save"></i>
                    Сохранить руководство
                </button>
                <a href="{% url 'guides:guide_list' %}" class="btn-cancel">
                    <i class="fas fa-times"></i>
                    Отмена
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
